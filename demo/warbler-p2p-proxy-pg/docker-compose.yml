services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: warbler
      POSTGRES_PASSWORD: warbler
      POSTGRES_DB: warbler
    volumes:
      - warbler-p2p-proxy-pg-data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  warbler-p2p-proxy-pg-data:
